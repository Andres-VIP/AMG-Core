name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: amg-core
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run tests
        run: ./gradlew --no-daemon clean test

      - name: Build application
        run: ./gradlew --no-daemon bootJar

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build application
        run: ./gradlew --no-daemon clean bootJar

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          if [ -z "$AWS_ACCOUNT_ID" ]; then
            echo "Error: AWS_ACCOUNT_ID secret is not set"
            exit 1
          fi
          
          REGISTRY="$AWS_ACCOUNT_ID.dkr.ecr.${AWS_REGION}.amazonaws.com"
          IMAGE="$REGISTRY/${ECR_REPOSITORY}:${IMAGE_TAG}"
          LATEST_IMAGE="$REGISTRY/${ECR_REPOSITORY}:latest"
          
          echo "Building Docker image..."
          docker build -t "$IMAGE" -t "$LATEST_IMAGE" .
          
          echo "Pushing image with tag: ${IMAGE_TAG}"
          docker push "$IMAGE"
          
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "Pushing latest tag for main branch"
            docker push "$LATEST_IMAGE"
          fi
          
          echo "Image pushed successfully: $IMAGE"

      - name: Deploy to ECS (optional)
        if: github.ref == 'refs/heads/main'
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
          ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
        run: |
          if [ -n "$ECS_CLUSTER" ] && [ -n "$ECS_SERVICE" ]; then
            echo "Deploying to ECS..."
            aws ecs update-service \
              --cluster "$ECS_CLUSTER" \
              --service "$ECS_SERVICE" \
              --force-new-deployment \
              --region "${{ env.AWS_REGION }}"
            echo "ECS service update initiated"
          else
            echo "ECS_CLUSTER and ECS_SERVICE secrets not set, skipping deployment"
          fi
